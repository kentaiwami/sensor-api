services:
  db:
    image: mariadb:11
    command: --default-time-zone='+09:00'
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: sensordb
      MARIADB_USER: sensor
      MARIADB_PASSWORD: sensor
      TZ: Asia/Tokyo
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
